name: "Shyntr Release Pipeline"

on:
  push:
    tags:
      - 'v*' # (Ex: v1.0.0, v2.1.3-beta)

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    name: Build Binaries (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go 1.25.7
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'
          check-latest: true

      - name: Verify Go Modules
        run: |
          go mod tidy
          go mod verify

      - name: Run Unit Tests (Security Gate)
        run: go test -v ./...
        env:
          GO_ENV: test

      - name: Prepare Build Environment
        id: prep
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          
          BINARY_NAME="shyntr-${{ matrix.goos }}-${{ matrix.goarch }}$EXT"
          echo "BINARY_NAME=$BINARY_NAME" >> $GITHUB_ENV
          
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=${{ env.VERSION }}" -o ${{ env.BINARY_NAME }} cmd/server/main.go

      - name: Generate Checksums (Zero Trust)
        run: |
          sha256sum ${{ env.BINARY_NAME }} > ${{ env.BINARY_NAME }}.sha256

      - name: Upload Binary to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ env.BINARY_NAME }}
            ${{ env.BINARY_NAME }}.sha256
          retention-days: 1


  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-assets
          pattern: binary-*
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          generate_release_notes: true
          fail_on_unmatched_files: true

  release-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: shyntr/shyntr
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-beta') && !contains(github.ref, '-rc') }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: shyntr/shyntr
          short-description: "Shyntr - Protocol Agnostic Identity Hub and Zero Trust Broker"
          readme-filepath: ./README.md