name: "Shyntr Development Pipeline"

on:
  push:
    branches:
      - 'develop'

permissions:
  contents: write
  packages: write

jobs:
  e2e-main:
    name: Main Lane
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Set up Go 1.25.7
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.7'
          check-latest: true

      # Federation and SAML flows are kept in a dedicated lane job to isolate bind-sensitive fixtures.
      - name: Run Main Lane Command
        run: go test ./internal/adapters/http/handlers -run 'TestOIDCE2E_(CoreFlow|TenantIsolation|RedirectURIExactMatching|Logout_|FederationCallback|SAMLACS|SAMLSLO)' -count=1

  release-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: shyntr/shyntr
          tags: |
            type=raw,value=dev

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: shyntr/shyntr
          short-description: "Shyntr - Protocol Agnostic Identity Hub and Zero Trust Broker"
          readme-filepath: ./README.md
