  /oauth2/auth:
    get:
      description: Handles the initial step of the OAuth 2.1 authorization code flow.
        Enforces PKCE, tenant boundaries, and redirects the user agent to the login
        or consent UI.
      parameters:
      - description: OAuth2 Client ID
        in: query
        name: client_id
        required: true
        type: string
      - description: Must be 'code'
        in: query
        name: response_type
        required: true
        type: string
      - description: Registered redirect URI
        in: query
        name: redirect_uri
        required: true
        type: string
      - description: Requested space-separated scopes
        in: query
        name: scope
        type: string
      - description: Opaque value used to maintain state between the request and the
          callback
        in: query
        name: state
        type: string
      - description: PKCE code challenge (Required if client enforces PKCE)
        in: query
        name: code_challenge
        type: string
      - description: PKCE method, e.g., 'S256'
        in: query
        name: code_challenge_method
        type: string
      - description: Forces login or consent (e.g., 'login', 'consent', 'none')
        in: query
        name: prompt
        type: string
      produces:
      - text/html
      responses:
        "302":
          description: Redirects to login UI, consent UI, or the client's redirect
            URI with an authorization code
          schema:
            type: string
        "400":
          description: Bad Request (e.g., missing PKCE, invalid redirect URI)
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden (e.g., client not found in tenant)
          schema:
            additionalProperties:
              type: string
            type: object
      summary: OAuth2 Authorization Endpoint
      tags:
      - OAuth2/OIDC Core
  /oauth2/introspect:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Allows a protected resource (e.g., an API gateway) to query the
        active state and metadata of a given token.
