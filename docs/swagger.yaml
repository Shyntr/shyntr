definitions:
  handlers.CreateWebhookRequest:
    properties:
      events:
        items:
          type: string
        type: array
      name:
        type: string
      tenant_ids:
        items:
          type: string
        type: array
      url:
        type: string
    required:
    - events
    - name
    - tenant_ids
    - url
    type: object
  model.AttributeMappingRule:
    properties:
      fallback:
        type: string
      source:
        type: string
      target:
        type: string
      target_scopes:
        items:
          type: string
        type: array
      type:
        type: string
      value:
        type: string
    type: object
  model.OAuth2Client:
    properties:
      access_token_lifespan:
        type: string
      allowed_cors_origins:
        items:
          type: string
        type: array
      app_id:
        type: string
      audience:
        items:
          type: string
        type: array
      backchannel_logout_uri:
        type: string
      client_id:
        type: string
      client_secret:
        type: string
      created_at:
        type: string
      enforce_pkce:
        type: boolean
      grant_types:
        items:
          type: string
        type: array
      id_token_lifespan:
        type: string
      name:
        type: string
      post_logout_redirect_uris:
        items:
          type: string
        type: array
      public:
        type: boolean
      redirect_uris:
        items:
          type: string
        type: array
      refresh_token_lifespan:
        type: string
      response_modes:
        items:
          type: string
        type: array
      response_types:
        items:
          type: string
        type: array
      scopes:
        items:
          type: string
        type: array
      skip_consent:
        type: boolean
      subject_type:
        type: string
      tenant_id:
        type: string
      token_endpoint_auth_method:
        type: string
      updated_at:
        type: string
    type: object
  model.OIDCConnection:
    properties:
      active:
        type: boolean
      attribute_mapping:
        additionalProperties:
          $ref: '#/definitions/model.AttributeMappingRule'
        type: object
      authorization_endpoint:
        type: string
      client_id:
        type: string
      client_secret:
        type: string
      created_at:
        type: string
      end_session_endpoint:
        type: string
      id:
        type: string
      issuer_url:
        type: string
      jwks_uri:
        type: string
      name:
        type: string
      scopes:
        items:
          type: string
        type: array
      tenant_id:
        type: string
      token_endpoint:
        type: string
      updated_at:
        type: string
      userinfo_endpoint:
        type: string
    type: object
  model.SAMLClient:
    properties:
      acs_url:
        type: string
      active:
        type: boolean
      allowed_scopes:
        items:
          type: string
        type: array
      attribute_mapping:
        additionalProperties:
          $ref: '#/definitions/model.AttributeMappingRule'
        type: object
      created_at:
        type: string
      encrypt_assertion:
        type: boolean
      entity_id:
        type: string
      force_authn:
        type: boolean
      id:
        type: string
      metadata_url:
        type: string
      name:
        type: string
      sign_assertion:
        type: boolean
      sign_response:
        type: boolean
      slo_url:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
    type: object
  model.SAMLConnection:
    properties:
      active:
        type: boolean
      attribute_mapping:
        additionalProperties:
          $ref: '#/definitions/model.AttributeMappingRule'
        type: object
      created_at:
        type: string
      force_authn:
        type: boolean
      id:
        type: string
      idp_certificate:
        type: string
      idp_encryption_certificate:
        type: string
      idp_entity_id:
        type: string
      idp_metadata_xml:
        type: string
      idp_single_sign_on:
        type: string
      idp_slo_url:
        type: string
      metadata_url:
        type: string
      name:
        type: string
      sign_request:
        type: boolean
      sp_private_key:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
    type: object
  model.Scope:
    properties:
      active:
        type: boolean
      claims:
        items:
          type: string
        type: array
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_system:
        type: boolean
      name:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
    type: object
  model.Tenant:
    properties:
      created_at:
        type: string
      description:
        type: string
      display_name:
        type: string
      id:
        type: string
      issuer_url:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  model.Webhook:
    properties:
      active:
        type: boolean
      created_at:
        type: string
      events:
        items:
          type: string
        type: array
      failure_count:
        type: integer
      id:
        type: string
      name:
        type: string
      tenant_ids:
        items:
          type: string
        type: array
      updated_at:
        type: string
      url:
        type: string
    type: object
  payload.AcceptConsentRequest:
    properties:
      grant_audience:
        example:
        - api.shyntr.internal
        items:
          type: string
        type: array
      grant_scope:
        example:
        - openid
        - profile
        - email
        items:
          type: string
        type: array
      remember:
        example: true
        type: boolean
      remember_for:
        example: 3600
        type: integer
      session:
        type: object
    type: object
  payload.AcceptLoginRequest:
    properties:
      context:
        type: object
      remember:
        example: false
        type: boolean
      remember_for:
        example: 0
        type: integer
      subject:
        example: usr_9f8b7c6d5e4a3b2c1
        type: string
    required:
    - subject
    type: object
  payload.AppError:
    properties:
      status_code:
        example: 400
        type: integer
      user_message:
        example: Invalid input provided
        type: string
    type: object
  payload.CreateOAuth2ClientRequest:
    properties:
      allowed_cors_origins:
        example:
        - https://app.example.com
        items:
          type: string
        type: array
      audience:
        example:
        - api-service
        items:
          type: string
        type: array
      backchannel_logout_uri:
        example: https://api.example.com/backchannel-logout
        type: string
      client_id:
        example: my-web-app
        type: string
      client_secret:
        example: super-secure-secret-key
        type: string
      enforce_pkce:
        example: true
        type: boolean
      grant_types:
        example:
        - authorization_code
        - refresh_token
        items:
          type: string
        type: array
      jwks:
        type: object
      name:
        example: My Frontend Application
        type: string
      post_logout_redirect_uris:
        example:
        - https://app.example.com/logout
        items:
          type: string
        type: array
      public:
        example: false
        type: boolean
      redirect_uris:
        example:
        - https://app.example.com/callback
        items:
          type: string
        type: array
      response_modes:
        example:
        - query
        - form_post
        items:
          type: string
        type: array
      response_types:
        example:
        - code
        items:
          type: string
        type: array
      scopes:
        example:
        - openid
        - profile
        - email
        - offline_access
        items:
          type: string
        type: array
      subject_type:
        example: public
        type: string
      tenant_id:
        example: default
        type: string
      token_endpoint_auth_method:
        example: client_secret_basic
        type: string
    required:
    - grant_types
    - name
    - redirect_uris
    - tenant_id
    type: object
  payload.CreateOIDCConnectionRequest:
    properties:
      attribute_mapping:
        type: object
      authorization_endpoint:
        example: https://accounts.google.com/o/oauth2/v2/auth
        type: string
      client_id:
        example: google-client-id.apps.googleusercontent.com
        type: string
      client_secret:
        example: YOUR_SECURE_CLIENT_SECRET
        type: string
      end_session_endpoint:
        example: https://oauth2.googleapis.com/revoke
        type: string
      id:
        example: conn_oidc_123
        type: string
      issuer_url:
        example: https://accounts.google.com
        type: string
      jwks_uri:
        example: https://www.googleapis.com/oauth2/v3/certs
        type: string
      name:
        example: Google Workspace SSO
        type: string
      scopes:
        example:
        - openid
        - profile
        - email
        items:
          type: string
        type: array
      tenant_id:
        example: tnt_alpha01
        type: string
      token_endpoint:
        example: https://oauth2.googleapis.com/token
        type: string
      user_info_endpoint:
        example: https://openidconnect.googleapis.com/v1/userinfo
        type: string
    required:
    - client_id
    - issuer_url
    - name
    - scopes
    - tenant_id
    type: object
  payload.CreateSAMLClientRequest:
    properties:
      acs_url:
        example: https://finance.acme.corp/saml/acs
        type: string
      allowed_scopes:
        example:
        - email
        - profile
        - groups
        items:
          type: string
        type: array
      attribute_mapping:
        type: object
      encrypt_assertion:
        example: false
        type: boolean
      entity_id:
        example: https://finance.acme.corp/saml/metadata
        type: string
      force_authn:
        example: true
        type: boolean
      metadata_url:
        example: https://finance.acme.corp/saml/metadata.xml
        type: string
      name:
        example: Acme Corp Finance App
        type: string
      sign_assertion:
        example: true
        type: boolean
      sign_response:
        example: true
        type: boolean
      slo_url:
        example: https://finance.acme.corp/saml/slo
        type: string
      sp_certificate:
        example: MIID...[Base64_Cert]...==
        type: string
      sp_encryption_certificate:
        example: MIID...[Base64_Cert]...==
        type: string
      tenant_id:
        example: tnt_alpha01
        type: string
    type: object
  payload.CreateSAMLConnectionRequest:
    properties:
      attribute_mapping:
        type: object
      force_authn:
        example: false
        type: boolean
      id:
        example: conn_saml_123
        type: string
      idp_certificate:
        example: MIID...[Base64_Cert]...==
        type: string
      idp_encryption_certificate:
        type: string
      idp_entity_id:
        example: http://www.okta.com/exk12345
        type: string
      idp_metadata_xml:
        example: <md:EntityDescriptor>...</md:EntityDescriptor>
        type: string
      idp_single_sign_on:
        example: https://corp.okta.com/app/shyntr/exk12345/sso/saml
        type: string
      idp_slo_url:
        example: https://corp.okta.com/app/shyntr/exk12345/slo/saml
        type: string
      metadata_url:
        example: https://corp.okta.com/app/shyntr/exk12345/sso/saml/metadata
        type: string
      name:
        example: Corporate Okta SSO
        type: string
      sign_request:
        example: true
        type: boolean
      sp_private_key:
        example: |-
          -----BEGIN PRIVATE KEY-----
          ...
          -----END PRIVATE KEY-----
        type: string
      tenant_id:
        example: tnt_alpha01
        type: string
    required:
    - name
    - tenant_id
    type: object
  payload.CreateTenantRequest:
    properties:
      description:
        example: Main production environment for Alpha Corp
        type: string
      display_name:
        example: Alpha Corp Production
        type: string
      id:
        example: tnt_alpha01
        type: string
      name:
        example: alpha-production
        type: string
    required:
    - name
    type: object
  payload.RejectRequestPayload:
    properties:
      error:
        example: access_denied
        type: string
      error_description:
        example: The resource owner or authorization server denied the request.
        type: string
    required:
    - error
    type: object
  payload.TenantResponse:
    properties:
      description:
        example: Main production environment for Alpha Corp
        type: string
      display_name:
        example: Alpha Corp Production
        type: string
      id:
        example: tnt_alpha01
        type: string
      issuer_url:
        example: https://api.shyntr.internal/t/tnt_alpha01
        type: string
      name:
        example: alpha-production
        type: string
    type: object
info:
  contact: {}
  description: Protocol Agnostic Zero Trust Identity Broker
  title: Shyntr Identity Hub API
  version: "1.0"
paths:
  /.well-known/jwks.json:
    get:
      description: Returns the public keys used by the Authorization Server to sign
        JWTs (like ID Tokens). Used by clients to verify signatures.
      produces:
      - application/json
      responses:
        "200":
          description: The JWKS document containing an array of keys
          schema:
            additionalProperties: true
            type: object
      summary: JSON Web Key Set (JWKS) Endpoint
      tags:
      - OAuth2/OIDC Core
  /.well-known/openid-configuration:
    get:
      description: Returns the OIDC Provider Configuration Document. Details the supported
        scopes, claims, and endpoints for a specific tenant.
      produces:
      - application/json
      responses:
        "200":
          description: The OIDC discovery metadata document
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Tenant not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: OpenID Connect Discovery Endpoint
      tags:
      - OAuth2/OIDC Core
  /admin/consent:
    get:
      description: Retrieves the details of an active OAuth2 consent challenge, including
        requested scopes and client tenant context.
      parameters:
      - description: The cryptographic consent challenge ID
        in: query
        name: consent_challenge
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Returns consent request details along with client and tenant
            information
          schema:
            additionalProperties: true
            type: object
        "400":
          description: consent_challenge is required
          schema:
            $ref: '#/definitions/payload.AppError'
        "404":
          description: Consent request not found
          schema:
            $ref: '#/definitions/payload.AppError'
        "500":
          description: Failed to fetch client details
          schema:
            $ref: '#/definitions/payload.AppError'
      summary: Get OAuth2 Consent Request
      tags:
      - Auth-Admin
  /admin/consent/accept:
    post:
      consumes:
      - application/json
      description: Accepts a consent request, granting the requested scopes and audiences
        to the OAuth2 client.
      parameters:
      - description: The cryptographic consent challenge ID
        in: query
        name: consent_challenge
        required: true
        type: string
      - description: Consent acceptance payload with granted scopes/audiences
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/payload.AcceptConsentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Returns redirect_to URL containing the consent verifier
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request payload or missing challenge
          schema:
            $ref: '#/definitions/payload.AppError'
        "500":
          description: Failed to accept consent request
          schema:
            $ref: '#/definitions/payload.AppError'
      summary: Accept OAuth2 Consent Request
      tags:
      - Auth-Admin
  /admin/consent/reject:
    post:
      consumes:
      - application/json
      description: Rejects a consent request (e.g., user denied access to scopes)
        and aborts the OAuth2 flow.
      parameters:
      - description: The cryptographic consent challenge ID
        in: query
        name: consent_challenge
        required: true
        type: string
      - description: Rejection payload containing error code and description
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/payload.RejectRequestPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Returns redirect_to URL containing error details
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request payload or missing challenge
          schema:
            $ref: '#/definitions/payload.AppError'
        "500":
          description: Failed to reject consent request
          schema:
            $ref: '#/definitions/payload.AppError'
      summary: Reject OAuth2 Consent Request
      tags:
      - Auth-Admin
  /admin/login:
    get:
      description: Retrieves the details of an active OAuth2 login challenge. Acts
        as an internal IdP trust boundary.
      parameters:
      - description: The cryptographic login challenge ID
        in: query
        name: login_challenge
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Returns the login request details
          schema:
            additionalProperties: true
            type: object
        "400":
          description: login_challenge is required
          schema:
            $ref: '#/definitions/payload.AppError'
        "404":
          description: Login request not found
          schema:
            $ref: '#/definitions/payload.AppError'
      summary: Get OAuth2 Login Request
      tags:
      - Auth-Admin
  /admin/login/accept:
    post:
      consumes:
      - application/json
      description: Accepts a login request and confirms the user's identity. Returns
        a redirection URL to continue the OAuth2 flow.
      parameters:
      - description: The cryptographic login challenge ID
        in: query
        name: login_challenge
        required: true
        type: string
      - description: Login acceptance payload containing subject and session preferences
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/payload.AcceptLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Returns redirect_to URL containing the login verifier
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request payload or missing challenge
          schema:
            $ref: '#/definitions/payload.AppError'
        "500":
          description: Failed to accept login request
          schema:
            $ref: '#/definitions/payload.AppError'
      summary: Accept OAuth2 Login Request
      tags:
      - Auth-Admin
  /admin/login/reject:
    post:
      consumes:
      - application/json
      description: Rejects a login request (e.g., due to invalid credentials or user
        denial) and aborts the OAuth2 flow.
      parameters:
      - description: The cryptographic login challenge ID
        in: query
        name: login_challenge
        required: true
        type: string
      - description: Rejection payload containing error code and description
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/payload.RejectRequestPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Returns redirect_to URL containing error details
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request payload or missing challenge
          schema:
            $ref: '#/definitions/payload.AppError'
        "500":
          description: Failed to reject login request
          schema:
            $ref: '#/definitions/payload.AppError'
      summary: Reject OAuth2 Login Request
      tags:
      - Auth-Admin
  /admin/management/clients:
    get:
      description: Lists all OAuth2/OIDC clients across the system. Secrets are masked.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.OAuth2Client'
            type: array
        "500":
          description: Failed to retrieve clients
          schema:
            $ref: '#/definitions/payload.AppError'
      security:
      - BearerAuth: []
      summary: List All OIDC Clients
      tags:
      - OAuth2 Clients
    post:
      consumes:
      - application/json
      description: Registers a new OAuth2/OIDC client under the specified tenant enforcing
        OAuth 2.1 standards.
      parameters:
      - description: Client Configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/payload.CreateOAuth2ClientRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/payload.CreateOAuth2ClientRequest'
        "400":
          description: Invalid request payload or tenant not found
          schema:
            $ref: '#/definitions/payload.AppError'
        "500":
          description: Failed to create OIDC req
          schema:
            $ref: '#/definitions/payload.AppError'
      security:
      - BearerAuth: []
      summary: Create OIDC Client
      tags:
      - OAuth2 Clients
  /admin/management/clients/{id}:
    get:
      description: Retrieves details of a specific OAuth2/OIDC client. Secrets are
        masked.
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.OAuth2Client'
        "404":
          description: OIDC Client not found
          schema:
            $ref: '#/definitions/payload.AppError'
      security:
      - BearerAuth: []
      summary: Get OIDC Client
      tags:
      - OAuth2 Clients
    put:
      consumes:
      - application/json
      description: Updates an existing OAuth2/OIDC client. Pass "*****" or empty string
        to keep the existing secret.
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: string
      - description: Client Update Configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/payload.CreateOAuth2ClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'status: updated'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/payload.AppError'
        "404":
          description: OIDC Client not found
          schema:
            $ref: '#/definitions/payload.AppError'
        "500":
          description: Failed to update OIDC client
          schema:
            $ref: '#/definitions/payload.AppError'
      security:
      - BearerAuth: []
      summary: Update OIDC Client
      tags:
      - OAuth2 Clients
  /admin/management/clients/{tenant_id}/{id}:
    delete:
      description: Deletes an OAuth2/OIDC client from a specific tenant.
      parameters:
      - description: Tenant ID
        in: path
        name: tenant_id
        required: true
        type: string
      - description: Client ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "500":
          description: Failed to delete OIDC client
          schema:
            $ref: '#/definitions/payload.AppError'
      security:
      - BearerAuth: []
      summary: Delete OIDC Client
      tags:
      - OAuth2 Clients
  /admin/management/dashboard/stats:
    get:
      description: Retrieves global or tenant-specific usage statistics and active
        connection counts.
      parameters:
      - description: Tenant ID (for filtering)
        in: query
        name: tenant_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Returns system statistics and recent activity
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get Dashboard Statistics
      tags:
      - Dashboard
  /admin/management/oidc-connections:
    get:
      description: Lists all federated OIDC Identity Providers.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.OIDCConnection'
            type: array
        "500":
          description: Failed to retrieve OIDC connections
          schema:
            $ref: '#/definitions/payload.AppError'
      security:
