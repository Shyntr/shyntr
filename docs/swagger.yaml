definitions:
  dto.CreateOAuth2ClientRequest:
    properties:
      allowed_cors_origins:
        example:
        - https://app.example.com
        items:
          type: string
        type: array
      audience:
        example:
        - api-service
        items:
          type: string
        type: array
      backchannel_logout_uri:
        example: https://api.example.com/backchannel-logout
        type: string
      client_id:
        example: my-web-app
        type: string
      client_secret:
        example: super-secure-secret-key
        type: string
      enforce_pkce:
        example: true
        type: boolean
      grant_types:
        example:
        - authorization_code
        - refresh_token
        items:
          type: string
        type: array
      jwks:
        type: object
      name:
        example: My Frontend Application
        type: string
      post_logout_redirect_uris:
        example:
        - https://app.example.com/logout
        items:
          type: string
        type: array
      public:
        example: false
        type: boolean
      redirect_uris:
        example:
        - https://app.example.com/callback
        items:
          type: string
        type: array
      response_modes:
        example:
        - query
        - form_post
        items:
          type: string
        type: array
      response_types:
        example:
        - code
        items:
          type: string
        type: array
      scopes:
        example:
        - openid
        - profile
        - email
        - offline_access
        items:
          type: string
        type: array
      subject_type:
        example: public
        type: string
      tenant_id:
        example: default
        type: string
      token_endpoint_auth_method:
        example: client_secret_basic
        type: string
    required:
    - grant_types
    - name
    - redirect_uris
    - tenant_id
    type: object
  dto.CreateSAMLClientRequest:
    properties:
      acs_url:
        type: string
      allowed_scopes:
        items:
          type: string
        type: array
      attribute_mapping:
        additionalProperties:
          $ref: '#/definitions/entity.AttributeMappingRule'
        type: object
      encrypt_assertion:
        type: boolean
      entity_id:
        type: string
      force_authn:
        type: boolean
      metadata_url:
        type: string
      name:
        type: string
      sign_assertion:
        type: boolean
      sign_response:
        type: boolean
      slo_url:
        type: string
      sp_certificate:
        type: string
      sp_encryption_certificate:
        type: string
      tenant_id:
        type: string
    type: object
  dto.CreateTenantRequest:
    properties:
      description:
        type: string
      display_name:
        type: string
      id:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  dto.TenantResponse:
    properties:
      description:
        type: string
      display_name:
        type: string
      id:
        type: string
      issuer_url:
        type: string
      name:
        type: string
    type: object
  entity.AttributeMappingRule:
    properties:
      fallback:
        type: string
      source:
        type: string
      target:
        type: string
      target_scopes:
        items:
          type: string
        type: array
      type:
        type: string
      value:
        type: string
    type: object
  entity.Tenant:
    properties:
      created_at:
        type: string
      description:
        type: string
      display_name:
        type: string
      id:
        type: string
      issuer_url:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
info:
  contact: {}
  description: Protocol Agnostic Zero Trust Identity Broker
  title: Shyntr Identity Hub API
  version: "1.0"
paths:
  /admin/management/clients:
    post:
      consumes:
      - application/json
      description: Registers a new OAuth2/OIDC client under the specified tenant enforcing
        OAuth 2.1 standards.
      parameters:
      - description: Client Configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateOAuth2ClientRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreateOAuth2ClientRequest'
      security:
      - BearerAuth: []
      summary: Create OIDC Client
      tags:
      - OAuth2 Clients
  /admin/management/dashboard/stats:
    get:
      description: Retrieves global or tenant-specific usage statistics and active
        connection counts.
      parameters:
      - description: Tenant ID (for filtering)
        in: query
        name: tenant_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get Dashboard Statistics
      tags:
      - Dashboard
  /admin/management/saml-clients:
    post:
      consumes:
      - application/json
      description: Registers a legacy SAML Service Provider in the system for federation.
      parameters:
      - description: SAML Client Configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateSAMLClientRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreateSAMLClientRequest'
      security:
      - BearerAuth: []
      summary: Create SAML Client
      tags:
      - SAML Clients
  /admin/management/tenants:
    get:
      description: Lists all tenants configured within the identity hub.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.TenantResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List Tenants
      tags:
      - Tenants
    post:
      consumes:
      - application/json
      description: Creates a new isolated tenant environment with strict data boundaries.
      parameters:
      - description: Tenant Information
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateTenantRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/entity.Tenant'
      security:
      - BearerAuth: []
      summary: Create Tenant
      tags:
      - Tenants
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
