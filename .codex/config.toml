# Repository-local Codex profile reference for Shyntr.
# Codex does not automatically read this file from the repo.
# Mirror the relevant parts into ~/.codex/config.toml when needed.

profile = "shyntr_fast"
project_doc_max_bytes = 12000
project_doc_fallback_filenames = ["AGENTS.md"]

[projects."/Users/nevzatcirak/Developer/projects/shyntr"]
trust_level = "trusted"

[profiles.shyntr_fast]
model = "gpt-5.4-mini"
model_reasoning_effort = "low"

[profiles.shyntr_build]
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"

[profiles.shyntr_deep]
model = "gpt-5.4"
model_reasoning_effort = "medium"
